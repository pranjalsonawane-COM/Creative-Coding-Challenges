<!DOCTYPE html>
<html>
<head>
    <title>Code That Draws Itself</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: monospace;
            color: #00ffcc;
        }

        #code {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 90%;
            white-space: pre-wrap;
            font-size: 18px;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<div id="code"></div>
<canvas id="canvas"></canvas>

<script>
const codeText = 
`function createMagic() {
    let dream = "PRANJAL";
    let code = "Turning ideas into reality";

    for(let i=0; i<dream.length; i++){
        console.log(dream[i]);
    }

    return code;
}

createMagic();`;

let i = 0;
const speed = 30;
const codeDiv = document.getElementById("code");

// ✨ TYPING EFFECT
function typeCode() {
    if (i < codeText.length) {
        codeDiv.innerHTML += codeText.charAt(i);
        i++;
        setTimeout(typeCode, speed);
    } else {
        setTimeout(startAnimation, 1000);
    }
}

typeCode();

// 🎬 CANVAS SETUP
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let showParticles = false;

// 🌟 CREATE PARTICLES FROM TEXT
function createParticles() {
    const textCanvas = document.createElement("canvas");
    const textCtx = textCanvas.getContext("2d");

    textCanvas.width = canvas.width;
    textCanvas.height = canvas.height;

    textCtx.fillStyle = "white";
    textCtx.font = "bold 120px Segoe UI Emoji";
    textCtx.textAlign = "center";
    textCtx.fillText("PRANJAL 🚀", canvas.width/2, canvas.height/2);

    const data = textCtx.getImageData(0, 0, canvas.width, canvas.height).data;

    for (let y = 0; y < canvas.height; y += 6) {
        for (let x = 0; x < canvas.width; x += 6) {
            let index = (y * canvas.width + x) * 4;
            if (data[index] > 150) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    tx: x,
                    ty: y,
                    vx: 0,
                    vy: 0,
                    size: 2,
                    color: `hsl(${Math.random()*360},100%,60%)`
                });
            }
        }
    }
}

// 🎬 TRANSITION
function startAnimation() {
    codeDiv.style.transition = "opacity 2s";
    codeDiv.style.opacity = 0;

    setTimeout(() => {
        showParticles = true;
        createParticles();
    }, 2000);
}

// 🌀 PARTICLE ANIMATION
function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (showParticles) {
        particles.forEach(p => {

            // FORM TEXT
            p.vx += (p.tx - p.x) * 0.02;
            p.vy += (p.ty - p.y) * 0.02;

            // RANDOM MOTION
            p.vx += (Math.random() - 0.5) * 0.5;
            p.vy += (Math.random() - 0.5) * 0.5;

            p.x += p.vx;
            p.y += p.vy;

            p.vx *= 0.85;
            p.vy *= 0.85;

            ctx.shadowBlur = 15;
            ctx.shadowColor = p.color;

            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
